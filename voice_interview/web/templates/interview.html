<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>面试中 — 模拟面试</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="interview-container">
  <!-- 顶部栏 -->
  <div class="top-bar">
    <span class="top-title">模拟面试</span>
    <span class="top-style" id="styleBadge"></span>
    <button class="btn-quit" onclick="quitInterview()">结束面试</button>
  </div>

  <!-- 进度条 -->
  <div class="progress-wrap">
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <span class="progress-text" id="progressText">准备中...</span>
  </div>

  <!-- 对话区 -->
  <div class="chat-area" id="chatArea">
    <div class="chat-loading">正在连接面试官...</div>
  </div>

  <!-- 反馈弹窗 -->
  <div class="feedback-toast" id="feedbackToast"></div>

  <!-- 输入区 -->
  <div class="input-area">
    <div class="timer-display" id="timerDisplay">
      <span class="timer-icon">⏱</span>
      <span class="timer-count" id="timerCount">--</span>
    </div>
    <button class="btn-mic" id="micBtn" onclick="toggleVoice()" title="语音回答">🎤</button>
    <input type="text" id="textInput" class="text-input chat-input"
      placeholder="输入你的回答... (支持 /skip 跳过 /quit 结束)">
    <button class="btn-send" id="sendBtn" onclick="submitAnswer()">发送</button>
    <button class="btn-give-up" id="giveUpBtn" onclick="giveUpEnglish()" style="display:none;">放弃此环节</button>
  </div>

  <div class="voice-status" id="voiceStatus"></div>

<!-- 论文翻译弹窗 -->
<div class="paper-overlay" id="paperOverlay" style="display:none;">
  <div class="paper-modal">
    <div class="paper-header">
      <span class="paper-label">English Paper Translation</span>
      <span class="paper-timer" id="paperTimer">05:00</span>
      <button class="paper-close" onclick="closePaper()">完成翻译，开始回答</button>
      <button class="paper-give-up" onclick="giveUpEnglish()">放弃翻译</button>
    </div>
    <div class="paper-body">
      <img id="paperImage" src="" alt="Academic Paper" style="width:100%;border-radius:4px;">
    </div>
    <div class="paper-footer">
      <span>阅读并准备翻译全文。点击右上角按钮后，逐句翻译成中文。</span>
    </div>
  </div>
</div>
</div>

<script>
// ========== 状态 ==========
let interviewFinished = false;
let isRecording = false;
let recognition = null;
let synth = window.speechSynthesis;
let config = JSON.parse(localStorage.getItem('interview_config') || '{}');
let paperShown = false;
let currentDim = '';

const styleNames = {stress: '压力面', structured: '结构化评分', gentle: '温和引导式'};
document.getElementById('styleBadge').textContent = styleNames[config.style] || '';

// ========== 启动面试 ==========
async function startInterview() {
  try {
    const resp = await fetch('/api/start', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(config)
    });
    const data = await resp.json();
    if (data.error) { alert(data.error); return; }
    addMessage('interviewer', data.opening);
    speakText(data.opening);
    if (data.question) {
      setTimeout(() => {
        addMessage('interviewer', data.question);
        speakText(data.question);
        updateProgress(data.dim_index, data.total_dims || 8);
        if (data.time_limit) {
          startQuestionTimer(data.time_limit);
        }
      }, 2000);
    }
  } catch (e) {
    document.getElementById('chatArea').innerHTML =
      '<div class="chat-error">连接失败，请确保服务器已启动</div>';
  }
}

// ========== 语音输入 ==========
let voiceStoppedByUser = false;

function toggleVoice() {
  if (isRecording) {
    stopVoice();
  } else {
    startVoice();
  }
}

function startVoice() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    alert('你的浏览器不支持语音识别，请使用 Chrome 或 Edge');
    return;
  }

  voiceStoppedByUser = false;
  recognition = new SpeechRecognition();
  recognition.lang = 'zh-CN';
  recognition.continuous = true;
  recognition.interimResults = true;
  recognition.maxAlternatives = 1;

  recognition.onstart = () => {
    isRecording = true;
    document.getElementById('micBtn').classList.add('recording');
    document.getElementById('voiceStatus').textContent = '🔴 正在聆听...';
  };

  recognition.onresult = (event) => {
    let finalText = '';
    let interimText = '';
    for (let i = 0; i < event.results.length; i++) {
      if (event.results[i].isFinal) {
        finalText += event.results[i][0].transcript;
      } else {
        interimText += event.results[i][0].transcript;
      }
    }
    const displayText = finalText + interimText;
    if (displayText) {
      document.getElementById('textInput').value = displayText;
      document.getElementById('voiceStatus').textContent = '📝 ' + displayText;
    }
  };

  recognition.onerror = (event) => {
    if (event.error === 'no-speech') {
      document.getElementById('voiceStatus').textContent = '🔇 未检测到语音，请继续说话...';
      return;
    }
    if (event.error === 'aborted') return;
    isRecording = false;
    document.getElementById('micBtn').classList.remove('recording');
    document.getElementById('voiceStatus').textContent = '⚠️ 识别失败: ' + event.error;
  };

  recognition.onend = () => {
    if (voiceStoppedByUser) {
      isRecording = false;
      document.getElementById('micBtn').classList.remove('recording');
      return;
    }
    // 自动重启：浏览器可能因静默而停止，用户未主动停止时自动恢复
    if (isRecording) {
      try {
        recognition.start();
      } catch (e) {
        isRecording = false;
        document.getElementById('micBtn').classList.remove('recording');
      }
    }
  };

  recognition.start();
}

function stopVoice() {
  voiceStoppedByUser = true;
  if (recognition) {
    try { recognition.stop(); } catch (e) {}
    isRecording = false;
    document.getElementById('micBtn').classList.remove('recording');
  }
}

// ========== TTS 语音输出 ==========
function speakText(text) {
  if (!synth) return;
  synth.cancel(); // 停止之前未完成的朗读

  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = detectEnglish(text) ? 'en-US' : 'zh-CN';
  utter.rate = config.style === 'stress' ? 1.3 : config.style === 'gentle' ? 0.9 : 1.0;
  utter.pitch = config.style === 'stress' ? 0.85 : 1.0;
  synth.speak(utter);
}

function detectEnglish(text) {
  const sample = text.slice(0, 80);
  const alpha = [...sample].filter(c => /[a-zA-Z]/.test(c)).length;
  const cjk = [...sample].filter(c => /[一-鿿]/.test(c)).length;
  return alpha > 10 && cjk === 0;
}

// ========== UI ==========
function addMessage(role, text) {
  const chat = document.getElementById('chatArea');
  const div = document.createElement('div');
  div.className = 'chat-msg msg-' + role;
  if (role === 'interviewer') {
    div.innerHTML = '<span class="msg-avatar">👔</span><div class="msg-bubble">' +
      escapeHtml(text).replace(/\n/g, '<br>') + '</div>';
  } else if (role === 'candidate') {
    div.innerHTML = '<div class="msg-bubble">' +
      escapeHtml(text).replace(/\n/g, '<br>') + '</div><span class="msg-avatar">🧑</span>';
  } else {
    div.innerHTML = '<div class="msg-bubble msg-system">' +
      escapeHtml(text) + '</div>';
  }
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  // 移除加载提示
  const loading = chat.querySelector('.chat-loading');
  if (loading) loading.remove();
}

function showFeedback(msg) {
  const toast = document.getElementById('feedbackToast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 3000);
}

function updateProgress(current, total) {
  const pct = Math.round((Math.min(current, total) / total) * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = current + ' / ' + total;
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

async function loadComparison() {
  try {
    const resp = await fetch('/api/compare');
    const data = await resp.json();
    if (data.has_history) {
      const div = document.createElement('div');
      div.className = 'chat-msg msg-system comparison-box';
      div.innerHTML = '<strong>📊 历史对比</strong><br>' +
        '上次均分: ' + data.avg_score + ' | 日期: ' + data.date;
      document.getElementById('chatArea').appendChild(div);
    }
  } catch (e) {}
}

function quitInterview() {
  if (interviewFinished || confirm('确定要结束面试吗？已答内容会被保存。')) {
    document.getElementById('textInput').value = '/quit';
    submitAnswer();
  }
}

// 回车发送
document.getElementById('textInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    submitAnswer();
  }
});

// ========== 论文翻译弹窗 ==========
let paperTimerInterval = null;
let paperSeconds = 300; // 5分钟

function showPaper(dim) {
  const major = config.major || '计算机';
  fetch('/api/paper/' + encodeURIComponent(major))
    .then(r => r.json())
    .then(data => {
      if (data.image_url) {
        document.getElementById('paperImage').src = data.image_url;
        document.getElementById('paperOverlay').style.display = 'flex';
        paperSeconds = 300;
        updateTimerDisplay();
        if (paperTimerInterval) clearInterval(paperTimerInterval);
        paperTimerInterval = setInterval(() => {
          paperSeconds--;
          updateTimerDisplay();
          if (paperSeconds <= 0) {
            clearInterval(paperTimerInterval);
            paperTimerInterval = null;
            document.getElementById('paperTimer').textContent = '时间到';
            document.getElementById('paperTimer').style.color = '#f85149';
          }
        }, 1000);
      } else {
        addMessage('system', '未找到该专业的论文图片，请直接阅读题目中的文献文本进行翻译。');
      }
    }).catch(e => {
      addMessage('system', '加载论文图片失败，请直接阅读题目中的文献文本进行翻译。');
    });
}

function updateTimerDisplay() {
  const m = Math.floor(paperSeconds / 60);
  const s = paperSeconds % 60;
  document.getElementById('paperTimer').textContent =
    String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
  if (paperSeconds < 60) {
    document.getElementById('paperTimer').style.color = '#f85149';
  }
}

function closePaper() {
  document.getElementById('paperOverlay').style.display = 'none';
  if (paperTimerInterval) {
    clearInterval(paperTimerInterval);
    paperTimerInterval = null;
  }
  document.getElementById('textInput').placeholder = '请逐句翻译论文内容...';
  document.getElementById('textInput').focus();
}

function giveUpEnglish() {
  if (confirm('确定要放弃英文文献翻译吗？将直接跳到下一环节。')) {
    document.getElementById('paperOverlay').style.display = 'none';
    if (paperTimerInterval) {
      clearInterval(paperTimerInterval);
      paperTimerInterval = null;
    }
    document.getElementById('textInput').value = '放弃翻译';
    speakText('好的，跳过文献翻译环节。');
    setTimeout(() => {
      submitAnswer();
    }, 1200);
  }
}

function updateGiveUpButton(dim) {
  const btn = document.getElementById('giveUpBtn');
  if (dim === 'english') {
    btn.style.display = 'inline-block';
  } else {
    btn.style.display = 'none';
  }
}

// ========== 题目计时器 ==========
let questionTimerInterval = null;
let questionSeconds = 0;

function startQuestionTimer(seconds) {
  clearQuestionTimer();
  questionSeconds = seconds;
  updateQuestionTimerDisplay();
  questionTimerInterval = setInterval(() => {
    questionSeconds--;
    updateQuestionTimerDisplay();
    if (questionSeconds <= 0) {
      clearQuestionTimer();
      document.getElementById('timerCount').textContent = '超时';
      document.getElementById('timerDisplay').classList.add('timeout');
      // 自动提交超时
      autoTimeout();
    }
  }, 1000);
}

function clearQuestionTimer() {
  if (questionTimerInterval) {
    clearInterval(questionTimerInterval);
    questionTimerInterval = null;
  }
  document.getElementById('timerDisplay').classList.remove('timeout');
}

let timeoutSubmitting = false;
function autoTimeout() {
  if (interviewFinished || timeoutSubmitting) return;
  timeoutSubmitting = true;
  // 立即停止语音识别
  if (isRecording) {
    voiceStoppedByUser = true;
    try { recognition.stop(); } catch (e) {}
    isRecording = false;
    document.getElementById('micBtn').classList.remove('recording');
  }
  addMessage('system', '⏰ 时间到，自动提交');
  document.getElementById('textInput').value = '(超时未作答)';
  // TTS 播报"时间到"，然后提交
  speakText('时间到。');
  setTimeout(() => {
    submitAnswer().then(() => { timeoutSubmitting = false; });
  }, 1200);
}

function updateQuestionTimerDisplay() {
  const m = Math.floor(Math.max(0, questionSeconds) / 60);
  const s = Math.max(0, questionSeconds) % 60;
  document.getElementById('timerCount').textContent =
    String(m) + ':' + String(s).padStart(2, '0');
  if (questionSeconds <= 30) {
    document.getElementById('timerDisplay').classList.add('warning');
  } else {
    document.getElementById('timerDisplay').classList.remove('warning');
  }
}


async function submitAnswer() {
  if (interviewFinished) return;
  const input = document.getElementById('textInput');
  const answer = input.value.trim();
  if (!answer) return;

  addMessage('candidate', answer);
  input.value = '';

  try {
    const resp = await fetch('/api/answer', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({answer})
    });
    const data = await resp.json();

    if (data.finished) {
      interviewFinished = true;
      addMessage('interviewer', data.report);
      speakText('面试结束。请查看你的评估报告。');
      document.getElementById('progressFill').style.width = '100%';
      document.getElementById('progressText').textContent = '完成';
      loadComparison();
    } else {
      if (data.feedback) {
        showFeedback(data.feedback);
      }
      if (data.question) {
        currentDim = data.current_dim;
        updateGiveUpButton(currentDim);
        // 检测英文文献维度 → 弹出论文图片（只弹一次）
        if (data.current_dim === 'english' && !paperShown) {
          paperShown = true;
          showPaper(data.current_dim);
        }
        setTimeout(() => {
          addMessage('interviewer', data.question);
          // 英文文献太长，跳过语音朗读
          if (data.current_dim !== 'english') {
            speakText(data.question);
          }
          updateProgress(data.dim_index, data.total_dims);
          if (data.time_limit) {
            startQuestionTimer(data.time_limit);
          }
        }, 500);
      }
      updateProgress(data.dim_index, data.total_dims);
    }
  } catch (e) {
    addMessage('system', '网络错误，请重试');
  }
}

// 启动
startInterview();
</script>
</body>
</html>
